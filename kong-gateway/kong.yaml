_format_version: "3.0"
_transform: true

services:
  # =========================================================
  # 1. BRANCH FINY (Domain: api.finy.vn)
  # =========================================================
  - name: finy-fio-service-test
    url: http://192.168.20.200:9101/fio
    routes:
      - name: finy-fio-service-test-route
        hosts: ["api.finy.vn"]
        paths: ["/t/fio"]
        strip_path: true
    plugins:
      - name: request-transformer
        config:
          add:
            headers:
              - "X-Forwarded-Prefix:/t/fio"
              - "X-Forwarded-Proto:https"
              - "X-Forwarded-Port:443"
              - "X-Forwarded-Host:api.finy.vn"
          replace:
            headers:
              - "X-Forwarded-Prefix:/t/fio"
              - "X-Forwarded-Proto:https"
              - "X-Forwarded-Port:443"
              - "X-Forwarded-Host:api.finy.vn"
      - name: rate-limiting
        config:
          second: 100
          hour: 100000
          policy: local

