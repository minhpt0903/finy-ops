_format_version: "3.0"
_transform: true

services:
  # =========================================================
  # 1. BRANCH FINY (Domain: api.finy.vn)
  # =========================================================
  - name: finy-core-service
    url: http://finy-backend:8080
    routes:
      - name: finy-main-route
        hosts: ["api.finy.vn"]
        paths: ["/"]              # Tiếp nhận toàn bộ traffic của Finy
        strip_path: false
    plugins:
      - name: cors                # Bật CORS bảo vệ, cho phép FE gọi vào không bị block
        config:
          origins: ["https://app.finy.vn"]
          credentials: true

  # =========================================================
  # 2. BRANCH 3GANG (Domain: api.3gang.vn)
  # =========================================================
  - name: 3gang-core-service
    url: http://3gang-backend:3000
    routes:
      - name: 3gang-main-route
        hosts: ["api.3gang.vn"]
        paths: ["/"]              # Tiếp nhận toàn bộ traffic của 3Gang (trừ fmarket nếu dùng chung domain)
        strip_path: false
    plugins:
      - name: cors
        config:
          origins: ["https://app.3gang.vn"]
          credentials: true

  # =========================================================
  # 3. SERVICE FMARKET (Thuộc nhánh 3Gang)
  # Có 2 trường hợp cấu hình:
  # =========================================================
  - name: fmarket-service
    url: http://fmarket-backend:8085
    routes:
      - name: fmarket-route
        # Trường hợp 3A: Nếu Fmarket có domain riêng biệt
        hosts: ["api.fmarket.vn", "api.3gang.vn"] 
        # Trường hợp 3B: Nếu dùng chung domain 3Gang nhưng phân biệt bằng context /fmarket
        paths: ["/fmarket"]
        strip_path: true          # Gọt bỏ chữ /fmarket trước khi đẩy vào code backend fmarket
    plugins:
      - name: cors
        config:
          origins: ["https://app.3gang.vn"]
          credentials: true

  # =========================================================
  # 4. CỤM CORE SERVICES (DÙNG CHUNG)
  # Mở cổng công khai qua Gateway cho Auth và Minio
  # =========================================================
  - name: core-auth-service
    url: http://core-auth:8081
    routes:
      - name: core-auth-route
        hosts: ["api.finy.vn", "api.3gang.vn", "api.fmarket.vn"] # Chấp nhận gọi từ tất cả các domain
        paths: ["/core/auth"]
        strip_path: true

  - name: core-minio-service
    url: http://minio:9000
    routes:
      - name: core-minio-route
        hosts: ["api.finy.vn", "api.3gang.vn", "api.fmarket.vn"]
        paths: ["/core/minio"]
        strip_path: true

  # =========================================================
  # 5. CỤM TEST (lb-test-01 — 192.168.20.200)
  # Truy cập qua /t/<tool>  — không yêu cầu auth
  # =========================================================
  - name: redpanda-test-service
    url: http://192.168.20.200:3300
    routes:
      - name: redpanda-test-route
        paths: ["/t/kafka"]
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          second: 100
          hour: 100000
          policy: local

  - name: grafana-test-service
    url: http://192.168.20.200:3000
    routes:
      - name: grafana-test-route
        paths: ["/t/grafana"]
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          second: 100
          hour: 100000
          policy: local

  - name: auth-test-service
    url: http://192.168.20.200:8000
    routes:
      - name: auth-test-entry-route
        hosts: ["api.finy.vn"]
        paths: ["/t"]
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          second: 100
          hour: 100000
          policy: local

  # =========================================================
  # 6. CỤM PRODUCTION (fn-api-01 — 192.168.30.110)
  # Truy cập qua /p/<tool>  — yêu cầu basic-auth
  # =========================================================
  - name: redpanda-prod-service
    url: http://192.168.30.110:3300
    routes:
      - name: redpanda-prod-route
        paths: ["/p/kafka"]
        strip_path: true
    plugins:
      - name: basic-auth
        config:
          hide_credentials: true
      - name: rate-limiting
        config:
          second: 100
          hour: 100000
          policy: local

consumers:
  - username: kafka-admin
    basicauth_credentials:
      - username: admin
        password: cyKTt0TfZwsWsVDs
  - username: kafka-developer
    basicauth_credentials:
      - username: developer
        password: FinyDev2026!@#

# =========================================================
# TẦNG PLUGIN TOÀN CỤC (GLOBAL PLUGINS)
# Áp dụng cho mọi Request đi qua Gateway để bảo vệ server
# =========================================================
plugins:
  - name: rate-limiting           # Giới hạn tần suất gọi chống DDoS phá hoại API
    config:
      second: 10                  # Tối đa 10 request/giây trên 1 IP
      hour: 20000                 # Tối đa 20.000 request/giờ
      policy: local